<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>政宣智作 · 管理后台</title>
<style>
:root{--nav:#0f2438;--blue:#1a6dc9;--green:#219b7b;--red:#cc4545;--gold:#c99440;--ink:#1a2737;--muted:#6d7b89;--line:#dfe4ea;--bg:#f1f4f8;--paper:#fff;--r:8px}
*{box-sizing:border-box;margin:0}html,body{height:100%;font-family:"Microsoft YaHei","PingFang SC",system-ui,sans-serif;color:var(--ink);background:var(--bg);font-size:14px}a{text-decoration:none;color:inherit}.app{display:grid;grid-template-columns:220px 1fr;height:100vh;overflow:hidden}.side{background:linear-gradient(180deg,#0f2438,#0a1b2b);color:#cddce8;display:flex;flex-direction:column;overflow-y:auto}.side-head{padding:18px 16px;border-bottom:1px solid rgba(255,255,255,.07)}.side-head h1{font-size:16px;color:#fff;letter-spacing:1px}.side-head small{font-size:10px;color:#7d9cb5;display:block;margin-top:3px}.nav{padding:12px 8px;flex:1}.nav-item{display:flex;align-items:center;gap:9px;padding:10px 12px;border-radius:6px;font-size:13px;color:#adc4d6;margin:2px 0;cursor:pointer;transition:.15s}.nav-item:hover{background:rgba(255,255,255,.07);color:#fff}.nav-item.active{background:linear-gradient(90deg,rgba(45,125,210,.25),rgba(45,125,210,.08));color:#fff;font-weight:500}.side-foot{padding:12px;border-top:1px solid rgba(255,255,255,.06);font-size:11px;color:#7893a8}.main{display:flex;flex-direction:column;overflow:hidden}.top{height:52px;background:var(--paper);border-bottom:1px solid var(--line);display:flex;align-items:center;padding:0 20px;gap:12px}.top h2{font-size:16px;font-weight:600}.page-info{font-size:11px;color:var(--muted)}.top-actions{margin-left:auto;display:flex;gap:8px;align-items:center}.workspace{flex:1;overflow:auto;padding:18px 20px}.btn{border:1px solid var(--line);border-radius:6px;padding:6px 12px;font-size:12px;background:var(--paper);cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:.12s}.btn:hover{border-color:#b5c6d8;background:#f7fafc}.btn.primary{background:var(--blue);border-color:var(--blue);color:#fff}.btn.danger{color:var(--red);border-color:#eac2c2;background:#fff8f8}.btn.green{background:var(--green);border-color:var(--green);color:#fff}.btn.small{padding:4px 8px;font-size:11px}.btn.xs{padding:2px 6px;font-size:10px}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}.stat{border:1px solid var(--line);background:var(--paper);border-radius:var(--r);padding:15px 16px}.stat .label{font-size:11px;color:var(--muted);margin-bottom:6px}.stat .value{font-size:22px;font-weight:650}.stat .sub{font-size:10px;color:#8c99a6;margin-top:4px}.green{color:var(--green)}.red{color:var(--red)}.gold{color:var(--gold)}.row{display:grid;grid-template-columns:1.4fr 1fr;gap:12px}.card{border:1px solid var(--line);background:var(--paper);border-radius:var(--r);overflow:hidden;margin-bottom:12px}.card-head{padding:12px 14px;border-bottom:1px solid var(--line);display:flex;align-items:center}.card-head h3{font-size:13px}.card-head .right{margin-left:auto;font-size:10px;color:var(--muted)}.card-body{padding:12px 14px}table{width:100%;border-collapse:collapse;font-size:12px}th{text-align:left;padding:8px 10px;background:#f8fafc;color:#6b7989;font-weight:500;border-bottom:1px solid var(--line)}td{padding:8px 10px;border-bottom:1px solid #eef1f5;vertical-align:top}.badge{display:inline-block;padding:2px 6px;border-radius:10px;font-size:10px}.badge.green{background:#e6f5ef;color:#1f8266}.badge.red{background:#fce8e8;color:#b53e3e}.badge.blue{background:#e8f0fa;color:#1a6dc9}.badge.gold{background:#f8efe1;color:#a77a2e}.tag{padding:2px 5px;border-radius:4px;font-size:10px;background:#eef2f7;color:#5a6979}input,select,textarea{font-family:inherit;font-size:12px;padding:6px 8px;border:1px solid var(--line);border-radius:5px;outline:0;width:100%}textarea{min-height:68px;resize:vertical}input:focus,select:focus,textarea:focus{border-color:#5897d2;box-shadow:0 0 0 2px #e7f2fc}.search-bar{display:flex;gap:8px;margin-bottom:12px;align-items:center}.search-bar input{max-width:280px}.form-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.form-row{margin-bottom:12px}.form-row label{display:block;font-size:11px;color:#5d6b7a;margin-bottom:5px}.warn{background:#fff8e8;border:1px solid #f3dfb8;color:#6c4a10;border-radius:8px;padding:10px 12px;font-size:12px;line-height:1.6;margin-bottom:12px}.actions{display:flex;gap:6px;flex-wrap:wrap}.log-box{white-space:pre-wrap;background:#101722;color:#dbe8f4;border-radius:8px;padding:10px;min-height:76px;font:12px/1.5 Consolas,monospace;margin-top:10px}.login-overlay{position:fixed;inset:0;z-index:9999;background:linear-gradient(135deg,#0f2438,#152d44);display:flex;align-items:center;justify-content:center}.login-card{background:#fff;border-radius:12px;padding:36px 32px;width:380px;max-width:90vw;box-shadow:0 20px 60px rgba(0,0,0,.25)}.login-card h2{margin:0 0 4px;font-size:20px;color:#1a2737}.login-card p{margin:0 0 20px;font-size:12px;color:#6d7b89}.login-card .btn{width:100%;padding:10px;border:0;border-radius:6px;font-size:14px;background:#1a6dc9;color:#fff;cursor:pointer;margin-top:4px}.login-error{color:#cc4545;font-size:11px;margin-top:8px;display:none}.version{text-align:center;font-size:10px;color:#8e9ba8;margin-top:16px}
</style>
<script>(function(){var f=window.fetch;window.fetch=function(u,o){o=o||{};if(typeof u==="string"&&u.startsWith("/api/")){o.headers=o.headers||{};var t=localStorage.getItem("admin_token");if(t)o.headers["Authorization"]="Bearer "+t}return f.call(window,u,o)}})();</script>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
</head>
<body>
<div class="app">
  <div class="side">
    <div class="side-head"><h1>政宣智作</h1><small>管理中心</small></div>
    <div class="nav">
      <div class="nav-item active" data-page="dashboard">📊 概览</div>
      <div class="nav-item" data-page="users">👥 用户管理</div>
      <div class="nav-item" data-page="orgs">🏛️ 组织管理</div>
      <div class="nav-item" data-page="templates">📋 模板管理</div>
      <div class="nav-item" data-page="billing">💰 额度与计费</div>
      <div class="nav-item" data-page="modelConfig">🔌 模型 API 配置</div>
      <div class="nav-item" data-page="settings">⚙️ 系统设置</div>
      <div class="nav-item" data-page="logs">📝 操作日志</div>
    </div>
    <div class="side-foot"><div>v0.4.1 · API 配置版</div><div style="margin-top:4px"><a href="/" target="_blank" style="color:#7d9cb5">← 返回前台</a></div></div>
  </div>
  <div class="main">
    <div class="top"><h2 id="pageTitle">概览</h2><span class="page-info" id="pageInfo">系统运行状态</span><div class="top-actions"><button class="btn small" onclick="location.reload()">🔄 刷新</button></div></div>
    <div class="workspace" id="workspace"></div>
  </div>
</div>

<div class="login-overlay" id="loginOverlay">
  <div class="login-card">
    <h2>管理后台</h2><p>政宣智作 - 管理中心</p>
    <div class="form-row"><label>手机号</label><input type="text" id="loginPhone" value="18800000000"></div>
    <div class="form-row"><label>密码</label><input type="password" id="loginPassword" placeholder="请输入管理员密码"></div>
    <button class="btn" id="loginBtn">登 录</button>
    <div class="login-error" id="loginError"></div>
    <div class="version">v0.4.1</div>
  </div>
</div>

<script>
const API = "/api/admin";
const MODEL_API = "/api/model-config";
const PAGES = {
  dashboard:{title:"概览",info:"系统运行状态"},
  users:{title:"用户管理",info:"管理平台注册用户"},
  orgs:{title:"组织管理",info:"管理注册单位"},
  templates:{title:"模板管理",info:"管理视频模板"},
  billing:{title:"额度与计费",info:"查看消费与充值记录"},
  modelConfig:{title:"模型 API 配置",info:"填写可灵、Seedance、万相、海螺、OpenAI 或自定义接口"},
  settings:{title:"系统设置",info:"平台全局配置"},
  logs:{title:"操作日志",info:"查看管理员操作记录"}
};
let currentPage="dashboard";let modelConfigs=[];let editingModelId="";
function esc(v){return String(v??"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[m]))}
function go(page){currentPage=page;document.querySelectorAll(".nav-item").forEach(n=>n.classList.toggle("active",n.dataset.page===page));const info=PAGES[page]||{title:page,info:""};pageTitle.textContent=info.title;pageInfo.textContent=info.info;loadPage(page)}
document.querySelectorAll(".nav-item").forEach(item=>item.addEventListener("click",()=>go(item.dataset.page)));
function loadPage(name){const ws=workspace;if(name==="dashboard")renderDashboard(ws);else if(name==="users")renderUsers(ws);else if(name==="orgs")renderOrgs(ws);else if(name==="templates")renderTemplates(ws);else if(name==="billing")renderBilling(ws);else if(name==="modelConfig")renderModelConfig(ws);else if(name==="settings")renderSettings(ws);else if(name==="logs")renderLogs(ws)}
async function jsonFetch(url,opts={}){opts.headers=opts.headers||{};if(opts.body&&!(opts.body instanceof FormData))opts.headers["Content-Type"]="application/json";const r=await fetch(url,opts);const d=await r.json().catch(()=>({error:"非 JSON 响应"}));if(!r.ok)throw d;return d}
function statusBadge(s){return `<span class="badge ${s==='enabled'||s==='active'||s==='completed'||s==='published'?'green':s==='disabled'?'red':'gold'}">${esc(s||'-')}</span>`}
async function renderDashboard(el){try{const data=await jsonFetch(API+"/dashboard");const s=data.stats||{};el.innerHTML=`<div class="stats"><div class="stat"><div class="label">注册用户</div><div class="value">${s.totalUsers||0}</div><div class="sub">活跃 ${s.activeUsers||0}</div></div><div class="stat"><div class="label">活跃组织</div><div class="value">${s.activeOrgs||0}</div><div class="sub">共 ${s.totalProjects||0} 个项目</div></div><div class="stat"><div class="label">模板库</div><div class="value">${s.templatesPublished||0}</div><div class="sub">已发布模板</div></div><div class="stat"><div class="label">余额</div><div class="value green">¥${s.balance||0}</div><div class="sub">收入 ¥${s.totalRevenue||0} · 消费 ¥${s.totalUsage||0}</div></div></div><div class="row"><div class="card"><div class="card-head"><h3>近7日趋势</h3></div><div class="card-body"><table><tr><th>日期</th><th>项目</th><th>用户</th><th>收入</th></tr>${(data.dailyStats||[]).map(d=>`<tr><td>${esc(d.date)}</td><td>${d.projects}</td><td>${d.users}</td><td>¥${d.revenue}</td></tr>`).join("")}</table></div></div><div class="card"><div class="card-head"><h3>最新交易</h3></div><div class="card-body"><table><tr><th>组织</th><th>类型</th><th>金额</th></tr>${(data.recentBilling||[]).map(b=>`<tr><td>${esc(b.org_name||b.org||b.name||"")}</td><td>${statusBadge(b.type)}</td><td>¥${b.amount}</td></tr>`).join("")}</table></div></div></div>`}catch(e){el.innerHTML=`<div class="card"><div class="card-body red">加载失败：${esc(e.error||e.message||e)}</div></div>`}}
async function renderUsers(el){try{const d=await jsonFetch(API+"/users");el.innerHTML=`<div class="card"><div class="card-head"><h3>全部用户</h3><span class="right">共 ${d.total||0} 人</span></div><div class="card-body"><table><tr><th>姓名</th><th>组织</th><th>手机号</th><th>角色</th><th>状态</th><th>最近登录</th></tr>${(d.users||[]).map(u=>`<tr><td><b>${esc(u.name)}</b></td><td>${esc(u.org_name||u.org||"")}</td><td>${esc(u.phone)}</td><td><span class="tag">${esc(u.role)}</span></td><td>${statusBadge(u.status)}</td><td>${esc(u.last_login||u.lastLogin||"")}</td></tr>`).join("")}</table></div></div>`}catch(e){el.innerHTML=`<div class="card"><div class="card-body red">加载失败：${esc(e.error||e.message||e)}</div></div>`}}
async function renderOrgs(el){try{const d=await jsonFetch(API+"/orgs");el.innerHTML=`<div class="card"><div class="card-head"><h3>注册组织</h3><span class="right">共 ${(d.orgs||[]).length}</span></div><div class="card-body"><table><tr><th>组织名称</th><th>简称</th><th>联系人</th><th>用户数</th><th>项目数</th><th>状态</th></tr>${(d.orgs||[]).map(o=>`<tr><td>${esc(o.name)}</td><td>${esc(o.short_name||o.short||"")}</td><td>${esc(o.contact||"")}</td><td>${o.user_count||o.users||0}</td><td>${o.project_count||o.projects||0}</td><td>${statusBadge(o.status)}</td></tr>`).join("")}</table></div></div>`}catch(e){el.innerHTML=`<div class="card"><div class="card-body red">加载失败：${esc(e.error||e.message||e)}</div></div>`}}
async function renderTemplates(el){try{const d=await jsonFetch(API+"/templates");el.innerHTML=`<div class="card"><div class="card-head"><h3>视频模板</h3><span class="right">共 ${(d.templates||[]).length}</span></div><div class="card-body"><table><tr><th>模板名称</th><th>分类</th><th>场景数</th><th>时长</th><th>使用次数</th><th>状态</th></tr>${(d.templates||[]).map(t=>`<tr><td><b>${esc(t.name)}</b><br><small style="color:var(--muted)">${esc(t.description||"")}</small></td><td><span class="tag">${esc(t.category)}</span></td><td>${t.scenes}</td><td>${esc(t.duration)}</td><td>${t.usage_count||t.usage||0}</td><td>${statusBadge(t.status)}</td></tr>`).join("")}</table></div></div>`}catch(e){el.innerHTML=`<div class="card"><div class="card-body red">加载失败：${esc(e.error||e.message||e)}</div></div>`}}
async function renderBilling(el){try{const [d1,d2]=await Promise.all([jsonFetch(API+"/billing"),jsonFetch(API+"/billing/stats")]);el.innerHTML=`<div class="stats"><div class="stat"><div class="label">总收入</div><div class="value green">¥${d2.totalRecharge||0}</div></div><div class="stat"><div class="label">总消费</div><div class="value red">¥${d2.totalConsume||0}</div></div><div class="stat"><div class="label">平台余额</div><div class="value">¥${d2.balance||0}</div></div><div class="stat"><div class="label">待确认</div><div class="value gold">¥${d2.pendingAmount||0}</div></div></div><div class="card"><div class="card-head"><h3>交易记录</h3></div><div class="card-body"><table><tr><th>日期</th><th>组织</th><th>类型</th><th>金额</th><th>方式</th><th>状态</th></tr>${(d1.records||[]).map(r=>`<tr><td>${esc(r.date)}</td><td>${esc(r.org_name||r.org||"")}</td><td>${statusBadge(r.type)}</td><td>¥${r.amount}</td><td>${esc(r.method)}</td><td>${statusBadge(r.status)}</td></tr>`).join("")}</table></div></div>`}catch(e){el.innerHTML=`<div class="card"><div class="card-body red">加载失败：${esc(e.error||e.message||e)}</div></div>`}}
function modelForm(){return `<div class="warn">真实 API Key 请只在这里填写，不要写进代码或提交到 GitHub。生产环境建议配置 API_KEY_ENCRYPTION_SECRET；保存后只显示掩码。</div><div class="card"><div class="card-head"><h3 id="modelFormTitle">新增模型 API 配置</h3><span class="right">个人级 > 组织级 > 平台级 > 环境变量 > 模拟模式</span></div><div class="card-body"><div class="form-grid"><div class="form-row"><label>作用范围</label><select id="mcScope"><option value="platform">平台级</option><option value="org">本组织</option><option value="user">仅当前用户</option></select></div><div class="form-row"><label>任务类型</label><select id="mcTask"><option value="text">文本 / 脚本</option><option value="image">图像</option><option value="video" selected>视频</option></select></div><div class="form-row"><label>供应商</label><select id="mcProvider"><option value="kling">可灵 Kling</option><option value="seedance">Seedance / 火山</option><option value="wanxiang">通义万相</option><option value="hailuo">海螺 Hailuo</option><option value="openai">OpenAI</option><option value="custom">自定义</option></select></div><div class="form-row"><label>模型名</label><input id="mcModel" value="kling-1.6" placeholder="如 kling-1.6 / seedance-pro"></div><div class="form-row"><label>显示名称</label><input id="mcName" value="可灵视频生成 API"></div><div class="form-row"><label>Base URL</label><input id="mcBase" placeholder="供应商 API Base URL，可暂空"></div><div class="form-row"><label>API Key</label><input id="mcKey" type="password" placeholder="填写后保存；留空不覆盖已有 Key"></div><div class="form-row"><label>优先级</label><input id="mcPriority" type="number" value="100"></div><div class="form-row"><label>状态</label><select id="mcStatus"><option value="enabled">启用</option><option value="disabled">禁用</option></select></div><div class="form-row"><label>额外参数 JSON</label><textarea id="mcParams">{}</textarea></div><div class="form-row"><label>额外 Headers JSON</label><textarea id="mcHeaders">{}</textarea></div></div><div class="actions"><button class="btn primary" onclick="saveModelConfig()">保存配置</button><button class="btn" onclick="resetModelForm()">清空</button><a class="btn" href="/model-config.html" target="_blank">打开独立页面</a></div><div class="log-box" id="modelLog">等待操作...</div></div></div>`}
async function renderModelConfig(el){el.innerHTML=modelForm()+`<div class="card"><div class="card-head"><h3>已保存配置</h3><span class="right"><button class="btn small" onclick="loadModelConfigs()">刷新</button></span></div><div class="card-body" id="modelTable">加载中...</div></div>`;await loadModelConfigs()}
function modelLog(data,err=false){const box=document.getElementById("modelLog");if(box)box.textContent=(err?"ERROR ":"OK ")+new Date().toLocaleTimeString()+"\n"+(typeof data==="string"?data:JSON.stringify(data,null,2))}
function parseJSON(id){const v=document.getElementById(id).value.trim();return v?JSON.parse(v):{}}
async function loadModelConfigs(){try{const d=await jsonFetch(MODEL_API+"/configs");modelConfigs=d.configs||[];renderModelTable();modelLog({configs:modelConfigs.length})}catch(e){modelLog(e,true);const mt=document.getElementById("modelTable");if(mt)mt.innerHTML=`<span class="red">加载失败：${esc(e.error||e.message||e)}</span>`}}
function renderModelTable(){const mt=document.getElementById("modelTable");if(!mt)return;if(!modelConfigs.length){mt.innerHTML="暂无配置，请先在上方新增。";return}mt.innerHTML=`<table><tr><th>范围</th><th>任务</th><th>供应商 / 模型</th><th>Key</th><th>状态</th><th>测试</th><th>操作</th></tr>${modelConfigs.map(c=>`<tr><td><span class="tag">${esc(c.scope)}</span></td><td>${esc(c.task_type)}</td><td><b>${esc(c.display_name||c.provider)}</b><br><small style="color:var(--muted)">${esc(c.provider)} / ${esc(c.model_name||'-')}<br>${esc(c.base_url||'')}</small></td><td>${c.has_api_key?esc(c.api_key_masked):'<span class="badge gold">未填</span>'}</td><td>${statusBadge(c.status)}<br><small>优先级 ${c.priority}</small></td><td><small>${esc(c.last_test_status||'-')}<br>${esc(c.last_test_message||'')}</small></td><td><div class="actions"><button class="btn xs" onclick="editModelConfig('${c.id}')">编辑</button><button class="btn xs" onclick="testModelConfig('${c.id}')">测试</button><button class="btn xs green" onclick="setModelStatus('${c.id}','enabled')">启用</button><button class="btn xs" onclick="setModelStatus('${c.id}','disabled')">禁用</button><button class="btn xs danger" onclick="deleteModelConfig('${c.id}')">删除</button></div></td></tr>`).join("")}</table>`}
function resetModelForm(){editingModelId="";modelFormTitle.textContent="新增模型 API 配置";mcScope.value="platform";mcTask.value="video";mcProvider.value="kling";mcModel.value="kling-1.6";mcName.value="可灵视频生成 API";mcBase.value="";mcKey.value="";mcPriority.value=100;mcStatus.value="enabled";mcParams.value="{}";mcHeaders.value="{}";modelLog("表单已清空")}
function editModelConfig(id){const c=modelConfigs.find(x=>x.id===id);if(!c)return;editingModelId=id;modelFormTitle.textContent="编辑模型 API 配置";mcScope.value=c.scope;mcTask.value=c.task_type;mcProvider.value=c.provider;mcModel.value=c.model_name||"";mcName.value=c.display_name||"";mcBase.value=c.base_url||"";mcKey.value="";mcPriority.value=c.priority||100;mcStatus.value=c.status||"disabled";mcParams.value=JSON.stringify(c.params||{},null,2);mcHeaders.value=JSON.stringify(c.extra_headers||{},null,2);modelLog("正在编辑 "+id+"；API Key 留空则不覆盖。")}
async function saveModelConfig(){try{const body={scope:mcScope.value,task_type:mcTask.value,provider:mcProvider.value,display_name:mcName.value,model_name:mcModel.value,base_url:mcBase.value,api_key:mcKey.value,priority:Number(mcPriority.value||100),status:mcStatus.value,params:parseJSON("mcParams"),extra_headers:parseJSON("mcHeaders")};const url=editingModelId?MODEL_API+"/configs/"+editingModelId:MODEL_API+"/configs";const d=await jsonFetch(url,{method:editingModelId?"PUT":"POST",body:JSON.stringify(body)});mcKey.value="";editingModelId="";modelLog(d);await loadModelConfigs()}catch(e){modelLog(e,true)}}
async function setModelStatus(id,status){try{modelLog(await jsonFetch(MODEL_API+"/configs/"+id+"/status",{method:"POST",body:JSON.stringify({status})}));await loadModelConfigs()}catch(e){modelLog(e,true)}}
async function testModelConfig(id){try{modelLog(await jsonFetch(MODEL_API+"/configs/"+id+"/test",{method:"POST",body:"{}"}));await loadModelConfigs()}catch(e){modelLog(e,true)}}
async function deleteModelConfig(id){if(!confirm("确定删除该模型 API 配置？"))return;try{modelLog(await jsonFetch(MODEL_API+"/configs/"+id,{method:"DELETE"}));await loadModelConfigs()}catch(e){modelLog(e,true)}}
async function renderSettings(el){try{const c=(await jsonFetch(API+"/settings")).config||{};el.innerHTML=`<div class="card"><div class="card-head"><h3>平台配置</h3></div><div class="card-body"><div class="form-grid"><div class="form-row"><label>平台名称</label><input id="sName" value="${esc(c.platformName||'政宣智作')}"></div><div class="form-row"><label>公告</label><input id="sNotice" value="${esc(c.notice||'')}"></div><div class="form-row"><label>允许注册</label><select id="sReg"><option value="true" ${c.allowRegister?'selected':''}>开启</option><option value="false" ${!c.allowRegister?'selected':''}>关闭</option></select></div><div class="form-row"><label>AI 标识</label><select id="sAi"><option value="true" ${c.aiIdentifier?'selected':''}>开启</option><option value="false" ${!c.aiIdentifier?'selected':''}>关闭</option></select></div></div><button class="btn primary" onclick="saveSettings()">保存配置</button></div></div>`}catch(e){el.innerHTML=`<div class="card"><div class="card-body red">加载失败：${esc(e.error||e.message||e)}</div></div>`}}
async function saveSettings(){await jsonFetch(API+"/settings",{method:"PUT",body:JSON.stringify({platformName:sName.value,notice:sNotice.value,allowRegister:sReg.value==="true",aiIdentifier:sAi.value==="true"})});alert("配置已保存")}
async function renderLogs(el){try{const d=await jsonFetch(API+"/logs");el.innerHTML=`<div class="card"><div class="card-head"><h3>操作日志</h3></div><div class="card-body"><table><tr><th>时间</th><th>操作人</th><th>操作</th><th>详情</th><th>IP</th></tr>${(d.logs||[]).map(l=>`<tr><td>${esc(l.created_at||l.time||"")}</td><td>${esc(l.user_name||l.user||"")}</td><td><span class="tag">${esc(l.action)}</span></td><td>${esc(l.detail)}</td><td>${esc(l.ip)}</td></tr>`).join("")}</table></div></div>`}catch(e){el.innerHTML=`<div class="card"><div class="card-body red">加载失败：${esc(e.error||e.message||e)}</div></div>`}}

var lo=document.getElementById("loginOverlay");var t=localStorage.getItem("admin_token");if(t){fetch("/api/auth/me",{headers:{Authorization:"Bearer "+t}}).then(r=>{if(r.ok){lo.style.display="none";loadPage(currentPage)}}).catch(()=>{})}
document.getElementById("loginBtn").addEventListener("click",function(){var btn=this;btn.disabled=true;btn.textContent="登录中...";var err=document.getElementById("loginError");err.style.display="none";fetch("/api/auth/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({phone:loginPhone.value,password:loginPassword.value})}).then(r=>r.json()).then(d=>{if(d.success){localStorage.setItem("admin_token",d.token);lo.style.display="none";loadPage(currentPage)}else{err.textContent=d.error||"登录失败";err.style.display="block";btn.disabled=false;btn.textContent="登 录"}}).catch(()=>{err.textContent="网络错误";err.style.display="block";btn.disabled=false;btn.textContent="登 录"})});
if(!t){loadPage("dashboard")}
</script>
</body>
</html>
