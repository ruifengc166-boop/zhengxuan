<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>政宣智作 · 模型 API 配置</title>
  <style>
    :root{--bg:#f4f7fb;--paper:#fff;--line:#dce4ed;--ink:#172335;--muted:#6c7b8a;--blue:#236fc8;--green:#16845f;--red:#c24646;--gold:#b47b25}
    *{box-sizing:border-box}body{margin:0;background:var(--bg);font-family:"Microsoft YaHei",system-ui,sans-serif;color:var(--ink);font-size:14px}.wrap{max-width:1180px;margin:0 auto;padding:28px 18px 70px}.top{display:flex;align-items:end;gap:16px;margin-bottom:18px}.top h1{margin:0;font-size:24px}.hint{color:var(--muted);font-size:13px;line-height:1.6}.grid{display:grid;grid-template-columns:420px 1fr;gap:16px}.card{background:var(--paper);border:1px solid var(--line);border-radius:14px;box-shadow:0 8px 24px rgba(20,40,80,.04);overflow:hidden}.card h2{margin:0;padding:14px 16px;border-bottom:1px solid var(--line);font-size:15px}.body{padding:14px 16px}.row{display:flex;gap:8px;margin-bottom:10px}.row>*{flex:1}label{display:block;font-size:12px;color:var(--muted);margin-bottom:5px}input,select,textarea{width:100%;border:1px solid var(--line);border-radius:8px;padding:9px 10px;font:inherit;font-size:13px;background:#fff}textarea{min-height:70px;resize:vertical}button{border:0;border-radius:8px;background:var(--blue);color:#fff;padding:9px 12px;cursor:pointer;font-size:13px}button.secondary{background:#e8eef6;color:#26384d}button.green{background:var(--green)}button.red{background:var(--red)}table{width:100%;border-collapse:collapse;font-size:12px}th,td{border-bottom:1px solid #edf1f6;text-align:left;padding:9px 8px;vertical-align:top}th{background:#f8fafc;color:#607080;font-weight:500}.badge{display:inline-block;border-radius:12px;padding:3px 8px;font-size:11px;background:#edf3fa;color:#38506c}.badge.green{background:#e5f5ee;color:#176f52}.badge.red{background:#fdeaea;color:#a83b3b}.badge.gold{background:#fff2dc;color:#94651d}.log{white-space:pre-wrap;background:#101722;color:#dbe8f4;border-radius:12px;padding:12px;min-height:120px;font:12px/1.5 Consolas,monospace}.small{font-size:12px;color:var(--muted);line-height:1.7}.actions{display:flex;gap:6px;flex-wrap:wrap}.actions button{font-size:11px;padding:5px 8px}.section-title{font-weight:600;margin:12px 0 8px}.warn{background:#fff8e8;border:1px solid #f3dfb8;color:#6c4a10;border-radius:10px;padding:10px 12px;font-size:12px;line-height:1.6;margin-bottom:12px}
  </style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <h1>模型 API 配置</h1>
    <div class="hint">在这里填写真实供应商 API Key。保存后生成任务会优先读取这里启用的配置；代码仓库不会保存任何真实 Key。</div>
  </div>

  <div class="warn">
    生产环境建议设置 <b>API_KEY_ENCRYPTION_SECRET</b>。本页面只显示 Key 的掩码，不会回显完整 Key。供应商“测试连接”只做安全连通性检查，不会提交真实生成任务，避免误扣费。
  </div>

  <div class="grid">
    <div class="card">
      <h2>登录 / 新增配置</h2>
      <div class="body">
        <div class="row"><div><label>手机号</label><input id="phone" value="18800000000"></div><div><label>密码</label><input id="password" type="password" placeholder="管理员密码"></div></div>
        <div class="row"><button onclick="login()">登录</button><button class="secondary" onclick="loadAll()">刷新</button></div>
        <label>Token</label><textarea id="token" placeholder="登录后自动填入，也可粘贴已有 token"></textarea>

        <div class="section-title">API 配置</div>
        <div class="row">
          <div><label>作用范围</label><select id="scope"><option value="platform">平台级</option><option value="org">本组织</option><option value="user">仅当前用户</option></select></div>
          <div><label>任务类型</label><select id="taskType"><option value="text">文本 / 脚本</option><option value="image">图像</option><option value="video" selected>视频</option></select></div>
        </div>
        <div class="row">
          <div><label>供应商</label><select id="provider"><option value="kling">可灵 Kling</option><option value="seedance">Seedance / 火山</option><option value="wanxiang">通义万相</option><option value="hailuo">海螺 Hailuo</option><option value="openai">OpenAI</option><option value="custom">自定义</option></select></div>
          <div><label>模型名</label><input id="modelName" value="kling-1.6" placeholder="如 kling-1.6 / seedance-pro"></div>
        </div>
        <label>显示名称</label><input id="displayName" value="可灵视频生成 API" placeholder="后台显示名称">
        <label>Base URL</label><input id="baseUrl" placeholder="供应商 API Base URL，可暂空">
        <label>API Key</label><input id="apiKey" type="password" placeholder="填写后保存；留空则不覆盖已有 Key">
        <div class="row">
          <div><label>优先级</label><input id="priority" type="number" value="100"></div>
          <div><label>状态</label><select id="status"><option value="enabled">启用</option><option value="disabled">禁用</option></select></div>
        </div>
        <label>额外参数 JSON</label><textarea id="params" placeholder='例如 {"duration":"6s","aspect_ratio":"16:9"}'>{}</textarea>
        <label>额外 Headers JSON</label><textarea id="headers" placeholder='例如 {"X-Api-Version":"2026-01-01"}'>{}</textarea>
        <div class="row"><button class="green" onclick="saveConfig()">保存配置</button><button class="secondary" onclick="resetForm()">清空</button></div>
        <div class="small">平台级配置只有超级管理员可保存；组织级配置适合给某个单位统一走自有 API；个人级配置适合测试。</div>
      </div>
    </div>

    <div class="card">
      <h2>已保存配置</h2>
      <div class="body">
        <div id="table"></div>
        <div style="height:12px"></div>
        <div class="log" id="log">等待操作...</div>
      </div>
    </div>
  </div>
</div>
<script>
let editingId = '';
let configs = [];
function getToken(){ return token.value.trim() || localStorage.getItem('model_config_token') || ''; }
function log(data, err=false){ const text=typeof data==='string'?data:JSON.stringify(data,null,2); document.getElementById('log').textContent=(err?'ERROR ':'OK ')+new Date().toLocaleTimeString()+"\n"+text; }
async function api(url, opts={}){ opts.headers=opts.headers||{}; opts.headers['Content-Type']='application/json'; const t=getToken(); if(t) opts.headers.Authorization='Bearer '+t; const res=await fetch(url,opts); const data=await res.json().catch(()=>({error:'非 JSON 响应'})); if(!res.ok) throw data; return data; }
async function login(){ try{ const data=await api('/api/auth/login',{method:'POST',body:JSON.stringify({phone:phone.value,password:password.value})}); token.value=data.token; localStorage.setItem('model_config_token',data.token); log(data); await loadAll(); }catch(e){log(e,true)} }
async function loadAll(){ try{ const data=await api('/api/model-config/configs'); configs=data.configs||[]; renderTable(); log(data); }catch(e){log(e,true)} }
function parseJSON(id){ const val=document.getElementById(id).value.trim(); if(!val) return {}; return JSON.parse(val); }
async function saveConfig(){ try{ const body={id:editingId||undefined,scope:scope.value,task_type:taskType.value,provider:provider.value,display_name:displayName.value,model_name:modelName.value,base_url:baseUrl.value,api_key:apiKey.value,priority:Number(priority.value||100),status:status.value,params:parseJSON('params'),extra_headers:parseJSON('headers')}; const data=await api(editingId?'/api/model-config/configs/'+editingId:'/api/model-config/configs',{method:editingId?'PUT':'POST',body:JSON.stringify(body)}); apiKey.value=''; editingId=''; log(data); await loadAll(); }catch(e){log(e,true)} }
function resetForm(){ editingId=''; displayName.value=''; modelName.value=''; baseUrl.value=''; apiKey.value=''; params.value='{}'; headers.value='{}'; priority.value=100; status.value='enabled'; }
function editConfig(id){ const c=configs.find(x=>x.id===id); if(!c) return; editingId=id; scope.value=c.scope; taskType.value=c.task_type; provider.value=c.provider; displayName.value=c.display_name||''; modelName.value=c.model_name||''; baseUrl.value=c.base_url||''; apiKey.value=''; priority.value=c.priority||100; status.value=c.status||'disabled'; params.value=JSON.stringify(c.params||{},null,2); headers.value=JSON.stringify(c.extra_headers||{},null,2); log('正在编辑 '+id+'；如不想覆盖 API Key，请保持 API Key 输入框为空。'); }
async function setStatus(id, st){ try{ log(await api('/api/model-config/configs/'+id+'/status',{method:'POST',body:JSON.stringify({status:st})})); await loadAll(); }catch(e){log(e,true)} }
async function testConfig(id){ try{ log(await api('/api/model-config/configs/'+id+'/test',{method:'POST',body:JSON.stringify({})})); await loadAll(); }catch(e){log(e,true)} }
async function delConfig(id){ if(!confirm('确定删除该配置？')) return; try{ log(await api('/api/model-config/configs/'+id,{method:'DELETE'})); await loadAll(); }catch(e){log(e,true)} }
function badge(c){ return '<span class="badge '+(c.status==='enabled'?'green':'red')+'">'+c.status+'</span>'; }
function renderTable(){ if(!configs.length){ table.innerHTML='<div class="small">暂无配置。请在左侧新增。</div>'; return; } table.innerHTML='<table><thead><tr><th>范围</th><th>任务</th><th>供应商 / 模型</th><th>Key</th><th>状态</th><th>测试</th><th>操作</th></tr></thead><tbody>'+configs.map(c=>`<tr><td><span class="badge">${c.scope}</span></td><td>${c.task_type}</td><td><b>${c.display_name||c.provider}</b><br><span class="small">${c.provider} / ${c.model_name||'-'}<br>${c.base_url||''}</span></td><td>${c.has_api_key?c.api_key_masked:'<span class="badge gold">未填</span>'}</td><td>${badge(c)}<br><span class="small">优先级 ${c.priority}</span></td><td><span class="small">${c.last_test_status||'-'}<br>${c.last_test_message||''}</span></td><td><div class="actions"><button class="secondary" onclick="editConfig('${c.id}')">编辑</button><button onclick="testConfig('${c.id}')">测试</button><button class="green" onclick="setStatus('${c.id}','enabled')">启用</button><button class="secondary" onclick="setStatus('${c.id}','disabled')">禁用</button><button class="red" onclick="delConfig('${c.id}')">删除</button></div></td></tr>`).join('')+'</tbody></table>'; }
window.onload=()=>{ token.value=localStorage.getItem('model_config_token')||''; if(token.value) loadAll(); };
</script>
</body>
</html>
